services:
  - type: web
    name: debates
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SPEND_CAP_USD
        value: "100"
      - key: PUBLIC_APP_URL
        value: https://debates-uvpv.onrender.com
